[alembic]
script_location = civiccode/migrations
prepend_sys_path = .
version_path_separator = os
path_separator = os
# Set DATABASE_URL in the environment, or inject sqlalchemy.url on the
# Alembic Config. CivicCore and CivicCode migrations use that same URL.

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s

name: verify

on:
  pull_request:
  push:
    branches: [main]

jobs:
  verify-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install CivicCore release wheel
        run: python -m pip install https://github.com/CivicSuite/civiccore/releases/download/v0.21.0/civiccore-0.21.0-py3-none-any.whl
      - name: Install package and test dependencies
        run: python -m pip install -e ".[dev]"
      - name: Run tests
        run: python -m pytest
      - name: Verify docs
        run: bash scripts/verify-docs.sh
      - name: Check CivicCore placeholder imports
        run: python scripts/check-civiccore-placeholder-imports.py
      - name: Verify release gate
        run: bash scripts/verify-release.sh

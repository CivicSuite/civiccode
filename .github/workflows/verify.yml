name: verify

on:
  pull_request:
  push:
    branches: [main]

jobs:
  verify-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install CivicCore release wheel
        run: python -m pip install https://github.com/CivicSuite/civiccore/releases/download/v0.22.1/civiccore-0.22.1-py3-none-any.whl
      - name: Install package and test dependencies
        run: python -m pip install -e ".[dev]"
      - name: Run product tests against published CivicCore
        run: python -m pytest --ignore=tests/test_release_provenance_gate.py
      - name: Run release-provenance tooling tests against CivicCore main
        run: |
          python -m pip install --force-reinstall "git+https://github.com/CivicSuite/civiccore.git@main"
          python -m pytest tests/test_release_provenance_gate.py
      - name: Verify docs
        run: bash scripts/verify-docs.sh
      - name: Check CivicCore placeholder imports
        run: python scripts/check-civiccore-placeholder-imports.py
      - name: Verify release gate
        run: bash scripts/verify-release.sh
